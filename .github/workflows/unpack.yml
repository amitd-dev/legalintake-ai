name: Unpack project
on: push
permissions:
  contents: write
jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack archive if present
        run: |
          if [ -f legalintake-ai-src.zip ]; then
            unzip -o legalintake-ai-src.zip -d .
            rm legalintake-ai-src.zip
            git config user.name "setup-bot"
            git config user.email "setup-bot@users.noreply.github.com"
            git add -A
            git commit -m "Unpack Phase 1 project files"
            git push
          fi
